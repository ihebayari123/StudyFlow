security:
  password_hashers:
    App\Entity\Utilisateur:
      algorithm: auto

  providers:
    app_user_provider:
      entity:
        class: App\Entity\Utilisateur
        property: email

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    main:
        lazy: true
        provider: app_user_provider
        custom_authenticator: App\Security\LoginFormAuthenticator   # <- this line is essential
        logout:
            path: app_logout
            target: app_login
        user_checker: App\Security\UserStatusChecker

  access_control:
    # ===== ROUTES 100% PUBLIQUES ===== (sans aucun login)
    - { path: ^/$, roles: PUBLIC_ACCESS }
    - { path: ^/captcha, roles: PUBLIC_ACCESS }
    - { path: ^/login, roles: PUBLIC_ACCESS }
    - { path: ^/logout, roles: PUBLIC_ACCESS }
    - { path: ^/register, roles: PUBLIC_ACCESS }
    - { path: ^/home, roles: PUBLIC_ACCESS }
    - { path: ^/useradd, roles: PUBLIC_ACCESS }
    - { path: ^/usersshow, roles: PUBLIC_ACCESS }
    - { path: ^/mot-de-passe-oublie, roles: PUBLIC_ACCESS }
    - { path: ^/test, roles: PUBLIC_ACCESS }
    - { path: ^/reinitialiser-mot-de-passe, roles: PUBLIC_ACCESS }
    - { path: ^/chat, roles: PUBLIC_ACCESS }
    - { path: ^/chat/send, roles: PUBLIC_ACCESS }
    
    # ===== BACKOFFICE ===== (enseignants + admins)
    - { path: ^/admin, roles: [ROLE_ADMIN, ROLE_ENSEIGNANT] }
    
    # ===== PAGE DE CHOIX ENSEIGNANT =====
    - { path: ^/login/success, roles: ROLE_ENSEIGNANT }
    
    # ===== TOUT LE RESTE ===== (nécessite juste d'être connecté)
    - { path: ^/, roles: ROLE_USER }

when@test:
  security:
    password_hashers:
      # By default, password hashers are resource intensive and take time. This is
      # important to generate secure password hashes. In tests however, secure hashes
      # are not important, waste resources and increase test times. The following
      # reduces the work factor to the lowest possible values.
      Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
        algorithm: auto
        cost: 4 # Lowest possible value for bcrypt
        time_cost: 3 # Lowest possible value for argon
        memory_cost: 10 # Lowest possible value for argon
