# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
  images_directory: '%kernel.project_dir%/public/uploads'  # dossier pour stocker les images uploadées
  chapters_directory: '%kernel.project_dir%/public/uploads/chapters'
  python_path: '%env(PYTHON_PATH)%'  # ← paramètre pour le chemin Python

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\EventListener\AuthenticationFailureListener:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
        tags:
            - { name: kernel.event_listener, event: security.authentication.failure, method: onAuthenticationFailure }
            
    App\Security\UserStatusChecker:
        arguments:
            $riskCalculator: '@App\Service\UserRiskCalculator'
            $entityManager: '@doctrine.orm.entity_manager'
            $notificationService: '@App\Service\NotificationService'

    # ✅ CORRECTION ICI : arguments bien indentés
    App\Service\PythonMlService:
        arguments:
            $python: '%python_path%'
            $logger: '@logger'

    App\Service\FeatureExtractor:
        # Pas besoin d'arguments spécifiques

    App\Service\UserRiskCalculator:
        arguments:
            $mlService: '@App\Service\PythonMlService'
            $featureExtractor: '@App\Service\FeatureExtractor'