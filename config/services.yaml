# config/services.yaml

# ---------------------------------------------------
# Paramètres globaux de l'application
# ---------------------------------------------------
parameters:
  images_directory: '%kernel.project_dir%/public/uploads'  # dossier pour stocker les images uploadées
  chapters_directory: '%kernel.project_dir%/public/uploads/chapters'
services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

# ---------------------------------------------------
# Configuration par défaut des services
# ---------------------------------------------------

    # Rendre toutes les classes dans src/ disponibles en tant que services
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    # AI Course Generator - local Ollama
    App\Service\OllamaService:
        arguments:
            $ollamaUrl: '%env(OLLAMA_URL)%'
            $model: '%env(OLLAMA_MODEL)%'
    # Ajouter ici d'autres services personnalisés si nécessaire
    # Remarque : les dernières définitions remplacent toujours les précédentes

    App\Service\PricePredictionService:
        arguments:
            $projectDir: '%kernel.project_dir%'
